<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | Soundwave Studio</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Cascading Style Sheets/app.css">
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="logo">
                <img src="img/soundwave.svg" alt="Soundwave">
                <span>Soundwave Studio</span>
            </div>
            <div class="nav">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a class="active" href="signup.html">Sign up</a>
            </div>
        </div>

        <section class="hero">
            <div>
                <h1>Create your account.</h1>
                <p>Build your library and save every playlist you love.</p>
            </div>
            <div class="panel">
                <form id="signupForm" class="form auth-form">
                    <div>
                        <label>Name</label>
                        <input type="text" name="name" required autocomplete="name">
                    </div>
                    <div>
                        <label>Email</label>
                        <input type="email" name="email" required autocomplete="email">
                    </div>
                    <div>
                        <label>Password</label>
                        <input type="password" name="password" required autocomplete="new-password" minlength="6">
                    </div>
                    <div class="error" id="signupError"></div>
                    <button class="button" type="submit">Create account</button>
                    <div class="helper">Already have an account? <a href="login.html">Login</a>.</div>
                </form>
            </div>
        </section>
    </div>
    <footer class="footer">
        Made with ❤️ by Amandeep. All rights reserved to Amandeep
    </footer>

    <script src="JavaScript/transition.js"></script>
    <script src="JavaScript/auth.js"></script>
</body>

</html>
