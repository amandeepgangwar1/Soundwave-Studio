<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists | Soundwave Studio</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Cascading Style Sheets/app.css">
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="logo">
                <img src="img/soundwave.svg" alt="Soundwave">
                <span>Soundwave Studio</span>
            </div>
            <div class="nav">
                <a href="home.html">Home</a>
                <a href="search.html">Search</a>
                <a class="active" href="artists.html">Artists</a>
                <a href="library.html">Library</a>
                <a href="premium.html">Premium</a>
            </div>
            <button class="button ghost" id="logoutBtn">Logout</button>
        </div>

        <section class="panel">
            <div class="section-title">Artists</div>
            <p class="muted">Follow artists to tune your recommendations and get updates in your library.</p>
        </section>

        <div class="split-layout">
            <section>
                <div class="panel search-panel">
                    <img class="icon-svg search-icon" src="img/searchbar.svg" alt="">
                    <input id="artistSearch" type="text" placeholder="Search artists">
                </div>
                <div class="grid" id="artistGrid"></div>
            </section>

            <aside class="panel detail-panel" id="artistDetail">
                <div class="section-title">Artist Details</div>
                <p class="muted">Select an artist to see songs and albums.</p>
            </aside>
        </div>
    </div>

    <footer class="footer">
        Made with love by Amandeep. All rights reserved to Amandeep
    </footer>

    <script src="JavaScript/navigation.js"></script>
    <script src="JavaScript/transition.js"></script>
    <script src="JavaScript/artists.js"></script>
</body>

</html>
