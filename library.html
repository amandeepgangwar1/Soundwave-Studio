<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library | Soundwave Studio</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Cascading Style Sheets/app.css">
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="logo">
                <img src="img/soundwave.svg" alt="Soundwave">
                <span>Soundwave Studio</span>
            </div>
            <div class="nav">
                <a href="home.html">Home</a>
                <a class="active" href="library.html">Library</a>
                <a href="admin.html">Admin</a>
            </div>
            <button class="button ghost" id="logoutBtn">Logout</button>
        </div>

        <section class="panel">
            <div class="section-title">Your Library</div>
            <p class="muted">Saved playlists and liked songs live here.</p>
        </section>

        <div class="section-title">Saved Playlists</div>
        <div class="grid" id="savedPlaylists"></div>

        <div class="section-title">Liked Songs</div>
        <div class="panel">
            <div class="list" id="likedSongs"></div>
        </div>
    </div>
    <footer class="footer">
        Made with ❤️ by Amandeep. All rights reserved to Amandeep
    </footer>

    <script src="JavaScript/transition.js"></script>
    <script src="JavaScript/library.js"></script>
</body>

</html>
