<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | Soundwave Studio</title>
    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="Cascading Style Sheets/app.css">
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="logo">
                <img src="img/soundwave.svg" alt="Soundwave">
                <span>Soundwave Studio</span>
            </div>
            <div class="nav">
                <a href="index.html">Home</a>
                <a class="active" href="admin-login.html">Sign in</a>
                <a href="admin-signup.html">Sign up</a>
            </div>
        </div>

        <section class="hero">
            <div>
                <h1>Sign in.</h1>
                <p>Use your account to manage playlists and songs.</p>
            </div>
            <div class="panel">
                <form id="adminLoginForm" class="form auth-form">
                    <div>
                        <label>Email/Phone</label>
                        <input type="text" name="email" required autocomplete="username">
                    </div>
                    <div>
                        <label>Password</label>
                        <input type="password" name="password" required autocomplete="current-password">
                    </div>
                    <div class="error" id="adminLoginError"></div>
                    <button class="button" type="submit">Login</button>
                    <div class="helper">Need an account? <a href="admin-signup.html">Create one</a>.</div>
                </form>
            </div>
        </section>
    </div>
    <footer class="footer">
        Made with ❤️ by Amandeep. All rights reserved to Amandeep
    </footer>

    <script src="JavaScript/navigation.js"></script>
    <script src="JavaScript/transition.js"></script>
    <script src="JavaScript/auth.js"></script>
</body>

</html>
