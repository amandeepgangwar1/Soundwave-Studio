services:
  - type: web
    runtime: node
    name: soundwave-studio
    plan: free
    buildCommand: npm --prefix server install
    startCommand: npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGO_URI
        sync: false
