<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | Soundwave Studio</title>
    <link rel="icon" href="../img/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="../Cascading Style Sheets/app.css">
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="logo">
                <img src="../img/soundwave.svg" alt="Soundwave">
                <span>Soundwave Studio</span>
            </div>
            <div class="nav">
                <a href="../home.html">Home</a>
                <a class="active" href="categories.html">Categories</a>
                <a href="../player.html">Player</a>
            </div>
            <div class="actions-end">
                <button class="button ghost" id="logoutBtn">Logout</button>
            </div>
        </div>

        <section class="panel">
            <div class="section-title">Categories</div>
            <div class="category-grid">
                <div class="mini-card">
                    <div class="mini-title">Trending</div>
                    <div class="mini-list">
                        <div>Play songs to populate</div>
                    </div>
                </div>
                <div class="mini-card">
                    <div class="mini-title">Latest</div>
                    <div class="mini-list">
                        <div>Play songs to populate</div>
                    </div>
                </div>
                <div class="mini-card">
                    <div class="mini-title">Top Hits</div>
                    <div class="mini-list">
                        <div>Play songs to populate</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        Made with love by Amandeep. All rights reserved to Amandeep
    </footer>
    <script src="../JavaScript/navigation.js"></script>
</body>

</html>
